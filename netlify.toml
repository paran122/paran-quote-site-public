[build]
  command = "npm run build"
  publish = ".next"

# ── 정적 자산 캐시 (이미지, 폰트, JS/CSS) ──
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
