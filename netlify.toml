[build]
  command = "npm run build"
  publish = ".next"

# ── 정적 자산 캐시 (이미지, 폰트, JS/CSS) ──
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# ── Prerender.io — 검색 크롤러에게 서버 렌더링된 HTML 제공 ──
# 팀장님이 prerender.io 가입 후 토큰을 환경변수(PRERENDER_TOKEN)로 설정해야 합니다.
# Netlify 대시보드 → Site settings → Environment variables → PRERENDER_TOKEN 추가
[[plugins]]
  package = "netlify-plugin-prerender"
  [plugins.inputs]
    prerenderToken = ""
    # 빈 문자열이면 환경변수 PRERENDER_TOKEN을 자동으로 사용합니다
